version: '3.8'

services:
  db:
    image: postgres:14
    container_name: agente-backend-db
    restart: always
    environment:
      POSTGRES_USER: adminagent
      POSTGRES_PASSWORD: Jb3IFxYzHcarFqXv
      POSTGRES_DB: agente_backend_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agente_network

  qdrant:
    image: qdrant/qdrant:v1.4.0
    container_name: agente-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"  # HTTP
      - "6334:6334"  # gRPC
    networks:
      - agente_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: agente-backend
    restart: always
    depends_on:
      - db
      - qdrant
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://adminagent:Jb3IFxYzHcarFqXv@db:5432/agente_backend_db"
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "6333"
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    networks:
      - agente_network

volumes:
  db_data:
  qdrant_storage:

networks:
  agente_network:
    external: true
